<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>nathantype</title>
    <script>
      // GitHub Pages SPA redirect
      // When GitHub serves this 404, encode the original path as a query
      // param so index.html can restore it via history.replaceState.
      // pathSegmentsToKeep = 1 preserves /NathanType in the URL.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>redirecting…</p>
  </body>
</html>
