<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" id="favicon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nathantype</title>
    <!-- Restore path after GitHub Pages 404 redirect -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
    <!-- Apply saved theme before React mounts to prevent flash of wrong colors -->
    <script>
      (function () {
        try {
          var v = JSON.parse(localStorage.getItem('nt-theme-vars') || 'null');
          if (!v) return;
          var r = document.documentElement.style;
          r.setProperty('--bg',             v.bg);
          r.setProperty('--bg2',            v.bg2);
          r.setProperty('--main',           v.main);
          r.setProperty('--text',           v.text);
          r.setProperty('--sub',            v.sub);
          r.setProperty('--error',          v.error);
          r.setProperty('--bg-primary',     v.bg);
          r.setProperty('--bg-secondary',   v.bg2);
          r.setProperty('--accent',         v.main);
          r.setProperty('--text-primary',   v.text);
          r.setProperty('--text-secondary', v.sub);
          r.setProperty('--correct',        v.text);
          r.setProperty('--caret-color',    v.main);
          // Restore saved font
          var ff = localStorage.getItem('nt-font-family');
          if (ff) {
            r.setProperty('--font-mono',   ff);
            r.setProperty('--font-family', ff);
          }
          // Update favicon to match theme
          var bg = v.bg2 || '#323437';
          var fg = v.main || '#e2b714';
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="' + bg + '"/><text x="16" y="23" font-family="\'Courier New\',monospace" font-size="18" font-weight="700" text-anchor="middle" fill="' + fg + '">nt</text></svg>';
          var el = document.getElementById('favicon');
          if (el) el.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Inconsolata:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Roboto+Mono:wght@400;500&family=Source+Code+Pro:wght@400;500&family=Space+Mono:wght@400;700&family=Ubuntu+Mono&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
